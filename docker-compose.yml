services:
  # The Redis "Mailbox" for background tasks
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  # The main application (FastAPI + Celery Worker)
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite:///./sidekick.db
      - PYTHONUNBUFFERED=1
    depends_on:
      - redis
    volumes:
      - ./sidekick.db:/app/sidekick.db
